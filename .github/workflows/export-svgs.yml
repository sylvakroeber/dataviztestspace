name: Export Chart SVGs

on:
  push:
    branches: [main]
    paths:
      - '*/config.yaml'
      - '*/data.csv'
      - '*/chart.js'
      - 'shared/**'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer serve

      - name: Start local HTTP server
        run: npx serve -p 8080 . &

      - name: Wait for server to be ready
        run: sleep 3

      - name: Export SVGs
        run: node scripts/export-svgs.js

      - name: Commit changed SVG files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate chart SVGs [skip ci]'
          file_pattern: '*/chart.svg */chart.png'
